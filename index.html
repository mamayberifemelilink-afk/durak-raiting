<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дурак — Карточная игра</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --panel: #1a1a2e;
            --gold: #d4a745;
            --gold-light: #f0d78c;
            --red: #c0392b;
            --green: #27ae60;
            --blue: #2980b9;
            --text: #ecf0f1;
            --card-bg: #fffef5;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle at 20% 30%, #1a1a3e, #0a0a18);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            user-select: none;
        }

        #app {
            width: 100%;
            max-width: 1300px;
            padding: 20px;
        }

        .setup {
            background: var(--panel);
            border-radius: 28px;
            padding: 35px 30px;
            box-shadow: var(--shadow);
            max-width: 650px;
            margin: 0 auto;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .setup h1 {
            font-size: 3em;
            font-weight: 900;
            background: linear-gradient(180deg, #f7dc6f, #b8860b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .subtitle {
            letter-spacing: 4px;
            font-size: 0.8em;
            color: #aaa;
            margin-bottom: 25px;
        }

        .balance-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .balance-box .label {
            font-size: 0.75em;
            letter-spacing: 2px;
            color: #888;
        }

        .balance-box .amount {
            font-size: 2.2em;
            font-weight: 900;
            color: #f0d78c;
        }

        .opt-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .opt-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--gold);
            font-size: 0.8em;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-opt {
            flex: 1;
            min-width: 70px;
            padding: 10px 12px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.03);
            color: #ccc;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85em;
            transition: 0.25s;
            text-align: center;
            white-space: nowrap;
        }

        .btn-opt:hover {
            border-color: var(--gold);
            background: rgba(212, 167, 69, 0.15);
            color: #fff;
        }

        .btn-opt.selected {
            border-color: var(--gold);
            background: rgba(212, 167, 69, 0.25);
            color: #fff;
            font-weight: 700;
        }

        .btn-opt.locked {
            opacity: 0.4;
            pointer-events: none;
            text-decoration: line-through;
            border-color: rgba(255, 0, 0, 0.4);
        }

        #btn-start {
            margin-top: 15px;
            padding: 14px 60px;
            font-size: 1.2em;
            font-weight: 800;
            letter-spacing: 2px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #d4a745, #b8860b);
            color: #1a1a2e;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(212, 167, 69, 0.4);
            text-transform: uppercase;
        }

        #btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 40px rgba(212, 167, 69, 0.6);
        }

        #btn-start:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .promo-btn {
            margin-top: 12px;
            padding: 10px 28px;
            font-size: 0.9em;
            font-weight: 700;
            letter-spacing: 1px;
            border-radius: 25px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: transparent;
            color: #ccc;
            cursor: pointer;
            transition: 0.2s;
        }

        .promo-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #f0d78c;
            color: #fff;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            z-index: 300;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(212, 167, 69, 0.5);
            width: 90%;
            max-width: 400px;
        }
        .modal-box h3 {
            color: #f0d78c;
            margin-bottom: 15px;
        }
        .modal-box input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            margin-bottom: 15px;
            font-size: 1em;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .modal-box button {
            padding: 10px 30px;
            border-radius: 20px;
            border: none;
            background: #d4a745;
            color: #1a1a2e;
            font-weight: 700;
            cursor: pointer;
        }
        .modal-box .close-btn {
            background: #555;
            color: #fff;
            margin-left: 10px;
        }

        .game {
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        .game.active {
            display: flex;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 10px 20px;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .top-bar .info {
            font-size: 0.9em;
            color: #bbb;
        }

        .top-bar .info span {
            color: #f0d78c;
            font-weight: 700;
        }

        .trump-badge {
            background: rgba(212, 167, 69, 0.2);
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 700;
            color: #f0d78c;
            border: 2px solid rgba(212, 167, 69, 0.5);
        }

        .bot-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .bot-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 18px;
            padding: 18px 15px;
            text-align: center;
            min-width: 130px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
            position: relative;
        }

        .bot-card.defender {
            border-color: #e74c3c !important;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.6);
            animation: pulseDefender 1.5s infinite;
        }

        .bot-card.attacker {
            border-color: #f39c12 !important;
            box-shadow: 0 0 15px rgba(243, 156, 18, 0.5);
        }

        .bot-card.active-action {
            animation: flashAction 0.6s ease;
        }

        @keyframes pulseDefender {
            0%,
            100% {
                box-shadow: 0 0 20px rgba(231, 76, 60, 0.6);
            }
            50% {
                box-shadow: 0 0 35px rgba(231, 76, 60, 1);
            }
        }

        @keyframes flashAction {
            0% {
                background: rgba(255, 215, 0, 0.2);
                transform: scale(1.05);
            }
            100% {
                background: rgba(0, 0, 0, 0.5);
                transform: scale(1);
            }
        }

        .bot-name {
            font-weight: 700;
            font-size: 1em;
            letter-spacing: 1px;
            color: #fff;
        }

        .bot-cards-count {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-top: 8px;
            font-size: 1.1em;
            font-weight: 700;
            color: #f0d78c;
        }

        .bot-cards-count .card-icon {
            font-size: 1.3em;
        }

        .status {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 700;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        .status.def {
            background: #c0392b;
        }
        .status.att {
            background: #e67e22;
        }
        .status.wait {
            background: #555;
            color: #aaa;
        }
        .status.out {
            background: #27ae60;
        }

        .table {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 24px;
            min-height: 140px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .pair {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            animation: cardAppear 0.4s ease;
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card {
            width: 60px;
            height: 88px;
            border-radius: 10px;
            background: #fffef5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border: 2px solid #ddd;
            transition: transform 0.2s;
        }

        .card.red {
            color: #c0392b;
        }
        .card.black {
            color: #1a1a2e;
        }
        .card .rank {
            font-size: 1.2em;
        }
        .card .suit {
            font-size: 1.4em;
        }
        .card.attack {
            border-color: #e74c3c;
        }
        .card.defend {
            border-color: #2ecc71;
            margin-top: -25px;
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .actions button {
            padding: 10px 22px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 1px;
            font-size: 0.85em;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .actions button:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .btn-take {
            background: #c0392b;
            color: #fff;
        }
        .btn-pass {
            background: #555;
        }
        .btn-transfer {
            background: #8e44ad;
            color: #fff;
        }
        .btn-finish {
            background: #2e86c1;
            color: #fff;
        }

        .hand-area {
            margin-top: 5px;
        }
        .hand-label {
            text-align: center;
            font-weight: 700;
            color: #f0d78c;
            margin-bottom: 8px;
        }
        .hand {
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .hand .card {
            cursor: pointer;
            transition: 0.2s;
            width: 65px;
            height: 94px;
        }
        .hand .card:hover {
            transform: translateY(-18px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.7);
            z-index: 5;
        }
        .hand .card.selected {
            transform: translateY(-22px);
            border-color: #f0d78c;
            box-shadow: 0 0 28px rgba(240, 215, 140, 0.8);
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .overlay.show {
            display: flex;
        }
        .overlay-box {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            border: 2px solid rgba(212, 167, 69, 0.4);
        }
        .overlay-box h2 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .overlay-box button {
            margin-top: 20px;
            padding: 12px 35px;
            border-radius: 25px;
            border: none;
            background: #d4a745;
            font-weight: 700;
            cursor: pointer;
        }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 700;
            z-index: 200;
            animation: notifPop 0.4s ease, notifFade 0.4s ease 2.5s forwards;
            background: #2980b9;
            color: #fff;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        @keyframes notifPop {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        @keyframes notifFade {
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
        }

        @media (max-width: 700px) {
            .card {
                width: 45px;
                height: 68px;
            }
            .hand .card {
                width: 48px;
                height: 72px;
            }
            .bot-card {
                min-width: 90px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Настройки -->
        <div id="setupScreen" class="setup">
            <h1>ДУРАК</h1>
            <div class="subtitle">Переводной • Подкидной</div>
            <div class="balance-box">
                <div class="label">💰 Ваш баланс</div>
                <div class="amount" id="balDisplay">10 000 ₽</div>
            </div>
            <div class="opt-group">
                <label>🎯 Ставка</label>
                <div class="btn-row" id="betRow"></div>
            </div>
            <div class="opt-group">
                <label>🤖 Сложность ботов</label>
                <div class="btn-row" id="diffRow"></div>
            </div>
            <div class="opt-group">
                <label>👥 Игроков</label>
                <div class="btn-row" id="countRow"></div>
            </div>
            <button id="btn-start">🎴 НАЧАТЬ ИГРУ</button>
            <button class="promo-btn" onclick="openPromo()">🎁 Промокоды</button>
        </div>

        <!-- Модальное окно промокодов -->
        <div class="modal-overlay" id="promoModal">
            <div class="modal-box">
                <h3>Введите промокод</h3>
                <input type="text" id="promoInput" placeholder="Например, GOLD100">
                <div>
                    <button onclick="applyPromo()">Применить</button>
                    <button class="close-btn" onclick="closePromo()">Закрыть</button>
                </div>
                <p style="color: #aaa; margin-top: 10px; font-size: 0.8em;" id="promoStatus">Промокоды загружаются...</p>
            </div>
        </div>

        <!-- Игра -->
        <div id="gameScreen" class="game">
            <div class="top-bar">
                <div class="info">💰 <span id="gBal">10 000</span></div>
                <div class="info">🎯 Ставка <span id="gBet">500</span></div>
                <div class="trump-badge">Козырь: <span id="gTrump">♠</span></div>
                <div class="info">🃏 Колода: <span id="gDeck">24</span></div>
                <button class="btn-pass" onclick="quitGame()">🚪 Выйти</button>
            </div>
            <div class="bot-area" id="botArea"></div>
            <div class="table" id="tableArea"><span style="color:#555;">Стол пуст</span></div>
            <div class="actions" id="actionBar"></div>
            <div class="hand-area">
                <div class="hand-label">🎴 Ваши карты</div>
                <div class="hand" id="playerHand"></div>
            </div>
        </div>

        <!-- Результат -->
        <div class="overlay" id="resultOverlay">
            <div class="overlay-box">
                <h2 id="resultTitle"></h2>
                <p id="resultMsg" style="color:#f0d78c; font-size:1.3em;"></p>
                <button onclick="backToSetup()">🔄 ВЕРНУТЬСЯ</button>
            </div>
        </div>
        <div class="notification" id="notification" style="display:none;"></div>
    </div>

    <script>
        (() => {
            // ---------- КОНСТАНТЫ ----------
            const SUITS = ['♥', '♦', '♣', '♠'];
            const RANKS = ['6', '7', '8', '9', '10', 'В', 'Д', 'К', 'Т'];
            const RANK_VAL = Object.fromEntries(RANKS.map((r, i) => [r, i]));
            const RED_SUITS = ['♥', '♦'];
            const BET_OPTIONS = [100, 250, 500, 750, 1000, 2000, 5000, 10000, 50000, 100000];
            const DIFF_OPTIONS = ['easy', 'medium', 'hard', 'impossible'];
            const DIFF_NAMES = { easy: 'Легкий', medium: 'Средний', hard: 'Сложный', impossible: 'Невозможный' };
            const PLAYER_COUNTS = [2, 3, 4, 5];
            const HIGH_LIMIT = 10000;

            // ---------- СОСТОЯНИЕ ----------
            let state = {
                balance: 10000,
                bet: 500,
                difficulty: 'medium',
                playerCount: 2,
                gameOn: false,
                deck: [],
                trumpSuit: null,
                players: [],
                humanIdx: 0,
                table: [],
                defenderIdx: -1,
                attackerIdx: -1,
                roundActive: false,
                attackOpen: true,
                transferUsed: [],
                gameOver: false,
                promoCodes: {}, // будет загружено из codes.json
            };

            // ---------- DOM ----------
            const $setup = document.getElementById('setupScreen');
            const $game = document.getElementById('gameScreen');
            const $balDisplay = document.getElementById('balDisplay');
            const $gBal = document.getElementById('gBal');
            const $gBet = document.getElementById('gBet');
            const $gTrump = document.getElementById('gTrump');
            const $gDeck = document.getElementById('gDeck');
            const $botArea = document.getElementById('botArea');
            const $tableArea = document.getElementById('tableArea');
            const $actionBar = document.getElementById('actionBar');
            const $playerHand = document.getElementById('playerHand');
            const $resultOverlay = document.getElementById('resultOverlay');
            const $resultTitle = document.getElementById('resultTitle');
            const $resultMsg = document.getElementById('resultMsg');
            const $notification = document.getElementById('notification');
            const $btnStart = document.getElementById('btn-start');
            const $promoModal = document.getElementById('promoModal');
            const $promoInput = document.getElementById('promoInput');
            const $promoStatus = document.getElementById('promoStatus');

            // ---------- УВЕДОМЛЕНИЯ ----------
            function notify(msg, bg = '#2980b9') {
                $notification.textContent = msg;
                $notification.style.background = bg;
                $notification.style.display = 'block';
                $notification.style.animation = 'none';
                void $notification.offsetWidth;
                $notification.style.animation = 'notifPop 0.4s ease, notifFade 0.4s ease 2.5s forwards';
                setTimeout(() => { $notification.style.display = 'none'; }, 2900);
            }

            // ---------- ЗАГРУЗКА ПРОМОКОДОВ ----------
            async function loadPromoCodes() {
                try {
                    const response = await fetch('codes.json');
                    if (!response.ok) throw new Error('Файл не найден');
                    const data = await response.json();
                    state.promoCodes = data;
                    $promoStatus.textContent = '✅ Промокоды загружены';
                    $promoStatus.style.color = '#2ecc71';
                } catch (err) {
                    console.warn('Не удалось загрузить codes.json, промокоды отключены');
                    state.promoCodes = {};
                    $promoStatus.textContent = '⚠ Промокоды недоступны';
                    $promoStatus.style.color = '#e67e22';
                }
            }

            // ---------- КАРТЫ ----------
            function createDeck() {
                let d = [];
                for (let s of SUITS)
                    for (let r of RANKS)
                        d.push({ suit: s, rank: r, value: RANK_VAL[r], id: r + s });
                return d;
            }

            function shuffle(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            function isTrump(c) { return c.suit === state.trumpSuit; }

            function cardColor(c) { return RED_SUITS.includes(c.suit) ? 'red' : 'black'; }

            function canBeat(att, def) {
                if (att.suit === def.suit) return def.value > att.value;
                return isTrump(def) && !isTrump(att);
            }

            function ranksOnTable() {
                let set = new Set();
                state.table.forEach(p => {
                    set.add(p.attack.rank);
                    if (p.defend) set.add(p.defend.rank);
                });
                return set;
            }

            // ---------- ИНИЦИАЛИЗАЦИЯ ИГРЫ ----------
            function startGame() {
                if (state.bet > state.balance) { notify('Недостаточно средств!', '#c0392b'); return; }
                state.deck = shuffle(createDeck());
                state.trumpSuit = state.deck[state.deck.length - 1].suit;
                state.players = [];
                for (let i = 0; i < state.playerCount; i++) {
                    state.players.push({
                        id: i,
                        name: i === 0 ? 'Вы' : `Бот ${i}`,
                        isHuman: i === 0,
                        hand: [],
                        out: false,
                        diff: i === 0 ? null : state.difficulty,
                    });
                }
                state.humanIdx = 0;
                for (let round = 0; round < 6; round++) {
                    for (let p of state.players) {
                        if (state.deck.length) p.hand.push(state.deck.pop());
                    }
                }
                let firstAtt = 0;
                let lowestTrump = null;
                for (let i = 0; i < state.players.length; i++) {
                    for (let c of state.players[i].hand) {
                        if (isTrump(c)) {
                            if (!lowestTrump || c.value < lowestTrump.value) {
                                lowestTrump = c;
                                firstAtt = i;
                            }
                        }
                    }
                }
                state.attackerIdx = firstAtt;
                state.defenderIdx = (firstAtt + 1) % state.playerCount;

                state.transferUsed = [firstAtt];

            function sortHand(p) {
                p.hand.sort((a, b) => {
                    const ta = isTrump(a),
                        tb = isTrump(b);
                    if (ta && !tb) return 1;
                    if (!ta && tb) return -1;
                    if (ta && tb) return a.value - b.value;
                    if (a.suit !== b.suit) return SUITS.indexOf(a.suit) - SUITS.indexOf(b.suit);
                    return a.value - b.value;
                });
            }

            function sortAllHands() { state.players.forEach(p => sortHand(p)); }

            function nextPlayer(idx) {
                let n = (idx + 1) % state.playerCount;
                for (let _ = 0; _ < state.playerCount; _++) {
                    if (!state.players[n].out) return n;
                    n = (n + 1) % state.playerCount;
                }
                return idx;

                    while (p.hand.length < 6 && state.deck.length) p.hand.push(state.deck.pop());
                    if (p.hand.length === 0 && state.deck.length === 0) p.out = true;
                }
                state.table = [];
                state.transferUsed = [];
                let active = state.players.filter(p => !p.out && p.hand.length > 0);
                if (active.length <= 1 && state.deck.length === 0) {
                    endGame();
                    return;
                }
                state.attackerIdx = success ? state.defenderIdx : state.defenderIdx;
                state.defenderIdx = nextPlayer(state.attackerIdx);
                state.transferUsed = [state.attackerIdx];
                state.roundActive = true;
                state.attackOpen = true;
                sortAllHands();
                updateUI();
                scheduleBotIfNeeded();
                if (state.defenderIdx === 0) notify('Теперь ваша защита!', '#e67e22');
                else if (state.attackerIdx === 0) notify('Ваш ход атаковать', '#2980b9');
            }

            function endGame() {
                state.gameOn = false;
                state.gameOver = true;
                let loser = state.players.find(p => !p.out && p.hand.length > 0) || state.players.find(p => p.hand.length >
                    0);
                let humanLost = loser && loser.id === 0;
                if (humanLost) {

                    $resultTitle.textContent = '😞 ВЫ ПРОИГРАЛИ';

                }
