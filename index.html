<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дурак — Карточная игра</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --panel: #1a1a2e;
            --gold: #d4a745;
            --gold-light: #f0d78c;
            --red: #c0392b;
            --green: #27ae60;
            --blue: #2980b9;
            --text: #ecf0f1;
            --card-bg: #fffef5;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle at 20% 30%, #1a1a3e, #0a0a18);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            color: var(--text); user-select: none;
        }
        #app { width: 100%; max-width: 1300px; padding: 20px; }
        .setup {
            background: var(--panel); border-radius: 28px; padding: 35px 30px;
            box-shadow: var(--shadow); max-width: 650px; margin: 0 auto;
            text-align: center; border: 1px solid rgba(255,255,255,0.08);
        }
        .setup h1 {
            font-size: 3em; font-weight: 900;
            background: linear-gradient(180deg, #f7dc6f, #b8860b);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 5px;
        }
        .subtitle { letter-spacing: 4px; font-size: 0.8em; color: #aaa; margin-bottom: 25px; }
        .balance-box {
            background: rgba(0,0,0,0.4); border-radius: 18px; padding: 15px;
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.08);
        }
        .balance-box .label { font-size: 0.75em; letter-spacing: 2px; color: #888; }
        .balance-box .amount { font-size: 2.2em; font-weight: 900; color: #f0d78c; }
        .opt-group { margin-bottom: 20px; text-align: left; }
        .opt-group label {
            display: block; font-weight: 700; margin-bottom: 8px;
            color: var(--gold); font-size: 0.8em; letter-spacing: 2px; text-transform: uppercase;
        }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-opt {
            flex: 1; min-width: 70px; padding: 10px 12px; border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.03);
            color: #ccc; cursor: pointer; font-weight: 600; font-size: 0.85em;
            transition: 0.25s; text-align: center; white-space: nowrap;
        }
        .btn-opt:hover { border-color: var(--gold); background: rgba(212,167,69,0.15); color: #fff; }
        .btn-opt.selected { border-color: var(--gold); background: rgba(212,167,69,0.25); color: #fff; font-weight: 700; }
        .btn-opt.locked { opacity: 0.4; pointer-events: none; text-decoration: line-through; border-color: rgba(255,0,0,0.4); }
        #btn-start {
            margin-top: 15px; padding: 14px 60px; font-size: 1.2em; font-weight: 800;
            letter-spacing: 2px; border-radius: 40px; border: none; cursor: pointer;
            background: linear-gradient(135deg, #d4a745, #b8860b); color: #1a1a2e;
            transition: 0.3s; box-shadow: 0 10px 30px rgba(212,167,69,0.4); text-transform: uppercase;
        }
        #btn-start:hover { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(212,167,69,0.6); }
        #btn-start:disabled { opacity: 0.5; pointer-events: none; }
        .promo-btn, .faq-btn {
            margin-top: 10px; padding: 10px 28px; font-size: 0.85em; font-weight: 700;
            letter-spacing: 1px; border-radius: 25px; border: 2px solid rgba(255,255,255,0.3);
            background: transparent; color: #ccc; cursor: pointer; transition: 0.2s;
        }
        .promo-btn:hover, .faq-btn:hover { background: rgba(255,255,255,0.05); border-color: #f0d78c; color: #fff; }
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 300;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: #1a1a2e; padding: 30px; border-radius: 20px; text-align: center;
            border: 1px solid rgba(212,167,69,0.5); width: 90%; max-width: 400px;
        }
        .modal-box h3 { color: #f0d78c; margin-bottom: 15px; }
        .modal-box input {
            width: 100%; padding: 12px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.4);
            color: #fff; margin-bottom: 15px; font-size: 1em; outline: none;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .modal-box button { padding: 10px 30px; border-radius: 20px; border: none; background: #d4a745; color: #1a1a2e; font-weight: 700; cursor: pointer; }
        .modal-box .close-btn { background: #555; color: #fff; margin-left: 10px; }
        .game { display: none; flex-direction: column; gap: 12px; }
        .game.active { display: flex; }
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.5); border-radius: 16px; padding: 10px 20px;
            flex-wrap: wrap; gap: 10px; border: 1px solid rgba(255,255,255,0.06);
        }
        .top-bar .info { font-size: 0.9em; color: #bbb; }
        .top-bar .info span { color: #f0d78c; font-weight: 700; }
        .trump-badge {
            background: rgba(212,167,69,0.2); padding: 6px 16px; border-radius: 20px;
            font-weight: 700; color: #f0d78c; border: 2px solid rgba(212,167,69,0.5);
        }
        .bot-area { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .bot-card {
            background: rgba(0,0,0,0.5); border-radius: 18px; padding: 18px 15px;
            text-align: center; min-width: 130px; border: 2px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease; position: relative;
        }
        .bot-card.defender { border-color: #e74c3c !important; box-shadow: 0 0 20px rgba(231,76,60,0.6); animation: pulseDefender 1.5s infinite; }
        .bot-card.attacker { border-color: #f39c12 !important; box-shadow: 0 0 15px rgba(243,156,18,0.5); }
        .bot-card.active-action { animation: flashAction 0.6s ease; }
        @keyframes pulseDefender { 0%,100%{ box-shadow: 0 0 20px rgba(231,76,60,0.6); } 50%{ box-shadow: 0 0 35px rgba(231,76,60,1); } }
        @keyframes flashAction { 0%{ background: rgba(255,215,0,0.2); transform: scale(1.05); } 100%{ background: rgba(0,0,0,0.5); transform: scale(1); } }
        .bot-name { font-weight: 700; font-size: 1em; letter-spacing: 1px; color: #fff; }
        .bot-cards-count { display: flex; align-items: center; justify-content: center; gap: 4px; margin-top: 8px; font-size: 1.1em; font-weight: 700; color: #f0d78c; }
        .bot-cards-count .card-icon { font-size: 1.3em; }
        .status { display: inline-block; padding: 4px 14px; border-radius: 12px; font-size: 0.75em; font-weight: 700; margin-top: 6px; letter-spacing: 1px; }
        .status.def { background: #c0392b; } .status.att { background: #e67e22; } .status.wait { background: #555; color: #aaa; } .status.out { background: #27ae60; }
        .table {
            background: rgba(0,0,0,0.4); border-radius: 24px; min-height: 140px; padding: 20px;
            display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .pair { display: flex; flex-direction: column; align-items: center; gap: 2px; animation: cardAppear 0.4s ease; }
        @keyframes cardAppear { from{ opacity:0; transform: translateY(-20px) scale(0.8); } to{ opacity:1; transform: translateY(0) scale(1); } }
        .card {
            width: 60px; height: 88px; border-radius: 10px; background: #fffef5;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: 900; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 2px solid #ddd;
            transition: transform 0.2s;
        }
        .card.red { color: #c0392b; } .card.black { color: #1a1a2e; } .card.trump-card {
    box-shadow: 0 0 20px rgba(240, 215, 140, 0.9), 0 0 8px rgba(212, 167, 69, 0.6);
    border-color: #f0d78c;
    z-index: 2;
    position: relative;
}
        .card .rank { font-size: 1.2em; } .card .suit { font-size: 1.4em; }
        .card.attack { border-color: #e74c3c; } .card.defend { border-color: #2ecc71; margin-top: -25px; }
        .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .actions button {
            padding: 10px 22px; border-radius: 25px; border: none; cursor: pointer;
            font-weight: 700; letter-spacing: 1px; font-size: 0.85em; transition: 0.2s; text-transform: uppercase;
        }
        .actions button:disabled { opacity: 0.4; pointer-events: none; }
        .btn-take { background: #c0392b; color: #fff; } .btn-pass { background: #555; }
        .btn-transfer { background: #8e44ad; color: #fff; } .btn-finish { background: #2e86c1; color: #fff; }
        .btn-beato { background: #27ae60; color: #fff; font-size: 1em; padding: 12px 28px; letter-spacing: 2px; }
        .hand-area { margin-top: 5px; }
        .hand-label { text-align: center; font-weight: 700; color: #f0d78c; margin-bottom: 8px; }
        .hand { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; }
        .hand .card { cursor: pointer; transition: 0.2s; width: 65px; height: 94px; }
        .hand .card:hover { transform: translateY(-18px); box-shadow: 0 12px 28px rgba(0,0,0,0.7); z-index: 5; }
        .hand .card.selected { transform: translateY(-22px); border-color: #f0d78c; box-shadow: 0 0 28px rgba(240,215,140,0.8); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100; }
        .overlay.show { display: flex; }
        .overlay-box { background: #1a1a2e; padding: 40px; border-radius: 24px; text-align: center; border: 2px solid rgba(212,167,69,0.4); }
        .overlay-box h2 { font-size: 2.5em; margin-bottom: 10px; }
        .overlay-box button { margin-top: 20px; padding: 12px 35px; border-radius: 25px; border: none; background: #d4a745; font-weight: 700; cursor: pointer; }
        .notification {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 30px;
            border-radius: 30px; font-weight: 700; z-index: 200;
            animation: notifPop 0.4s ease, notifFade 0.4s ease 2.5s forwards;
            background: #2980b9; color: #fff; box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        @keyframes notifPop { from{ opacity:0; transform: translateX(-50%) translateY(-20px); } to{ opacity:1; transform: translateX(-50%) translateY(0); } }
        @keyframes notifFade { to{ opacity:0; transform: translateX(-50%) translateY(-20px); } }
        /* FAQ */
        .faq-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .faq-tab {
            flex: 1; padding: 8px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.03);
            color: #aaa; cursor: pointer; font-weight: 600; font-size: 0.8em;
            transition: 0.2s; text-align: center;
        }
        .faq-tab.active { border-color: #d4a745; background: rgba(212,167,69,0.2); color: #fff; }
        .faq-content { color: #ccc; font-size: 0.9em; line-height: 1.5; text-align: left; }
        .faq-content p { margin-bottom: 10px; }
        @media (max-width:700px){ .card{ width:45px; height:68px; } .hand .card{ width:48px; height:72px; } .bot-card{ min-width:90px; padding:10px; } }
    </style>
</head>
<body>
<div id="app">
    <!-- Настройки -->
    <div id="setupScreen" class="setup">
        <h1>ДУРАК</h1>
        <div class="subtitle">Переводной • Подкидной</div>
        <div class="balance-box">
            <div class="label">💰 Ваш баланс</div>
            <div class="amount" id="balDisplay">10 000 ₽</div>
        </div>
        <div class="opt-group">
            <label>🎯 Ставка</label>
            <div class="btn-row" id="betRow"></div>
        </div>
        <div class="opt-group">
            <label>🤖 Сложность ботов</label>
            <div class="btn-row" id="diffRow"></div>
        </div>
        <div class="opt-group">
            <label>👥 Игроков</label>
            <div class="btn-row" id="countRow"></div>
        </div>
        <button id="btn-start">🎴 НАЧАТЬ ИГРУ</button>
        <button class="promo-btn" onclick="openPromo()">🎁 Промокоды</button>
        <button class="faq-btn" onclick="openFaq()">❓ FAQ</button>
    </div>

    <!-- Модальное окно промокодов -->
    <div class="modal-overlay" id="promoModal">
        <div class="modal-box">
            <h3>Введите промокод</h3>
            <input type="text" id="promoInput" placeholder="Например, GOLD100">
            <div>
                <button onclick="applyPromo()">Применить</button>
                <button class="close-btn" onclick="closePromo()">Закрыть</button>
            </div>
            <p style="color: #aaa; margin-top: 10px; font-size: 0.8em;" id="promoStatus">Промокоды загружаются...</p>
        </div>
    </div>

    <!-- Модальное окно FAQ -->
    <div class="modal-overlay" id="faqModal">
        <div class="modal-box" style="max-width: 500px; text-align: left;">
            <h3 style="text-align:center; color:#f0d78c; margin-bottom:15px;">❓ Частые вопросы</h3>
            <div class="faq-tabs">
                <button class="faq-tab active" onclick="switchFaqTab('rules')">📜 Правила игры</button>
                <button class="faq-tab" onclick="switchFaqTab('stakes')">💰 Ставки</button>
            </div>
            <div class="faq-content" id="faqContent"></div>
            <div style="text-align:center; margin-top:15px;">
                <button class="close-btn" onclick="closeFaq()">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- Игра -->
    <div id="gameScreen" class="game">
        <div class="top-bar">
            <div class="info">💰 <span id="gBal">10 000</span></div>
            <div class="info">🎯 Ставка <span id="gBet">500</span></div>
            <div class="trump-badge">Козырь: <span id="gTrump">♠</span></div>
            <div class="info">🃏 Колода: <span id="gDeck">24</span></div>
            <button class="btn-pass" onclick="quitGame()">🚪 Выйти</button>
        </div>
        <div class="bot-area" id="botArea"></div>
        <div class="table" id="tableArea"><span style="color:#555;">Стол пуст</span></div>
        <div class="actions" id="actionBar"></div>
        <div class="hand-area">
            <div class="hand-label">🎴 Ваши карты</div>
            <div class="hand" id="playerHand"></div>
        </div>
    </div>

    <!-- Результат -->
    <div class="overlay" id="resultOverlay">
        <div class="overlay-box">
            <h2 id="resultTitle"></h2>
            <p id="resultMsg" style="color:#f0d78c; font-size:1.3em;"></p>
            <button onclick="backToSetup()">🔄 ВЕРНУТЬСЯ</button>
        </div>
    </div>
    <div class="notification" id="notification" style="display:none;"></div>
</div>

<script>
(() => {
    // ========== КОНСТАНТЫ ==========
    const SUITS = ['♥','♦','♣','♠'];
    const RANKS = ['6','7','8','9','10','В','Д','К','Т'];
    const RANK_VAL = Object.fromEntries(RANKS.map((r,i)=>[r,i]));
    const RED_SUITS = ['♥','♦'];
    const BET_OPTIONS = [100,250,500,750,1000,2000,5000,10000,50000,100000];
    const DIFF_OPTIONS = ['easy','medium','hard','impossible'];
    const DIFF_NAMES = { easy:'Легкий', medium:'Средний', hard:'Сложный', impossible:'Невозможный' };
    const PLAYER_COUNTS = [2,3,4,5];
    const HIGH_LIMIT = 10000;

    // ========== СОСТОЯНИЕ ==========
    let state = {
        balance: 10000, bet: 500, difficulty: 'medium', playerCount: 2,
        gameOn: false, deck: [], trumpSuit: null, players: [], humanIdx: 0,
        table: [], defenderIdx: -1, attackerIdx: -1, roundActive: false,
        attackOpen: true, transferUsed: [], gameOver: false,
        promoCodes: {}, waitingForPlayerBeato: false
    };

    // DOM элементы
    const $setup = document.getElementById('setupScreen');
    const $game = document.getElementById('gameScreen');
    const $balDisplay = document.getElementById('balDisplay');
    const $gBal = document.getElementById('gBal');
    const $gBet = document.getElementById('gBet');
    const $gTrump = document.getElementById('gTrump');
    const $gDeck = document.getElementById('gDeck');
    const $botArea = document.getElementById('botArea');
    const $tableArea = document.getElementById('tableArea');
    const $actionBar = document.getElementById('actionBar');
    const $playerHand = document.getElementById('playerHand');
    const $resultOverlay = document.getElementById('resultOverlay');
    const $resultTitle = document.getElementById('resultTitle');
    const $resultMsg = document.getElementById('resultMsg');
    const $notification = document.getElementById('notification');
    const $btnStart = document.getElementById('btn-start');
    const $promoModal = document.getElementById('promoModal');
    const $promoInput = document.getElementById('promoInput');
    const $promoStatus = document.getElementById('promoStatus');

    // Уведомления
    function notify(msg, bg='#2980b9') {
        $notification.textContent = msg;
        $notification.style.background = bg;
        $notification.style.display = 'block';
        $notification.style.animation = 'none';
        void $notification.offsetWidth;
        $notification.style.animation = 'notifPop 0.4s ease, notifFade 0.4s ease 2.5s forwards';
        setTimeout(()=>{ $notification.style.display = 'none'; }, 2900);
    }

    // Загрузка промокодов
    async function loadPromoCodes() {
        try {
            const resp = await fetch('codes.json');
            if (!resp.ok) throw new Error();
            state.promoCodes = await resp.json();
            $promoStatus.textContent = '✅ Промокоды загружены';
            $promoStatus.style.color = '#2ecc71';
        } catch(e) {
            state.promoCodes = {};
            $promoStatus.textContent = '⚠ Промокоды недоступны';
            $promoStatus.style.color = '#e67e22';
        }
    }

    // ========== FAQ ==========
    const faqData = {
        rules: `
            <p><strong>Цель:</strong> избавиться от всех карт. Кто остаётся с картами — дурак.</p>
            <p><strong>Ход игры:</strong> один игрок атакует, другой защищается. Атаковать можно картами того же достоинства, что уже лежат на столе. Защита — картой той же масти, но старше, либо козырем.</p>
            <p><strong>Переводной:</strong> если у защищающегося есть карта того же достоинства, он может перевести атаку следующему игроку.</p>
            <p><strong>Подкидной:</strong> пока защита не завершена, любой игрок (кроме защищающегося) может подкидывать карты того же достоинства, что уже на столе.</p>
            <p><strong>Козырь:</strong> определяется случайной картой снизу колоды. Козырь бьёт любую некозырную карту.</p>
            <p><strong>Завершение:</strong> если защищающийся отбился, он нажимает «Бито» (или боты решают сами). Если не может — забирает все карты со стола и пропускает ход.</p>
        `,
        stakes: `
            <p><strong>Ставки 10 000, 50 000, 100 000 ₽</strong> доступны только на сложности <strong>«Невозможный»</strong>.</p>
            <p>Это сделано для баланса: большие ставки требуют максимальной внимательности и стратегии. Боты на этом уровне играют почти идеально, используют переводы и берегут козыри.</p>
            <p>Если вы хотите играть на высоких ставках, выберите «Невозможную» сложность — тогда все ставки станут доступны.</p>
        `
    };
    function switchFaqTab(tab) {
        document.querySelectorAll('.faq-tab').forEach(el => el.classList.remove('active'));
        document.querySelector(`.faq-tab[onclick="switchFaqTab('${tab}')"]`).classList.add('active');
        document.getElementById('faqContent').innerHTML = faqData[tab] || '';
    } window.switchFaqTab = switchFaqTab;
    function openFaq() {
        document.getElementById('faqModal').classList.add('show');
        switchFaqTab('rules');
    } window.openFaq = openFaq;
    function closeFaq() {
        document.getElementById('faqModal').classList.remove('show');
    } window.closeFaq = closeFaq;

    // ========== ИГРОВАЯ МЕХАНИКА ==========
    function createDeck() {
        let d = [];
        for (let s of SUITS) for (let r of RANKS) d.push({suit:s, rank:r, value:RANK_VAL[r], id:r+s});
        return d;
    }
    function shuffle(arr) { for (let i=arr.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
    function isTrump(c) { return c.suit === state.trumpSuit; }
    function cardColor(c) { return RED_SUITS.includes(c.suit)?'red':'black'; }
    function canBeat(att, def) { return (att.suit===def.suit && def.value>att.value) || (isTrump(def)&&!isTrump(att)); }
    function ranksOnTable() {
        const set = new Set();
        state.table.forEach(p=>{ set.add(p.attack.rank); if(p.defend) set.add(p.defend.rank); });
        return set;
    }

    function startGame() {
        if (state.bet > state.balance) { notify('Недостаточно средств!','#c0392b'); return; }
        state.deck = shuffle(createDeck());
        state.trumpSuit = state.deck[state.deck.length-1].suit;
        state.players = [];
        for (let i=0; i<state.playerCount; i++) {
            state.players.push({
                id:i, name:i===0?'Вы':`Бот ${i}`, isHuman:i===0, hand:[], out:false, diff:i===0?null:state.difficulty
            });
        }
        state.humanIdx = 0;
        for (let r=0; r<6; r++) for (let p of state.players) if (state.deck.length) p.hand.push(state.deck.pop());
        // Случайный первый атакующий
        state.attackerIdx = Math.floor(Math.random() * state.playerCount);
        state.defenderIdx = (state.attackerIdx + 1) % state.playerCount;
        state.table = [];
        state.roundActive = true;
        state.attackOpen = true;
        state.transferUsed = [state.attackerIdx];
        state.gameOver = false;
        state.gameOn = true;
        state.waitingForPlayerBeato = false;
        sortAllHands();
        updateUI();
        $setup.style.display = 'none';
        $game.classList.add('active');
        scheduleBotIfNeeded();
        notify(state.defenderIdx===0?'Вы защищаетесь!':(state.attackerIdx===0?'Ваша атака!':'Боты делают ход'));
    }

    function sortHand(p) {
        p.hand.sort((a,b)=>{
            const ta=isTrump(a), tb=isTrump(b);
            if (ta&&!tb) return 1;
            if (!ta&&tb) return -1;
            if (ta&&tb) return a.value-b.value;
            if (a.suit!==b.suit) return SUITS.indexOf(a.suit)-SUITS.indexOf(b.suit);
            return a.value-b.value;
        });
    }
    function sortAllHands() { state.players.forEach(p=>sortHand(p)); }
    function nextPlayer(idx) {
        let n=(idx+1)%state.playerCount;
        for (let _=0;_<state.playerCount;_++) { if (!state.players[n].out) return n; n=(n+1)%state.playerCount; }
        return idx;
    }

    function endRound(success) {
        let order=[], start=state.defenderIdx;
        for (let i=0;i<state.playerCount;i++) order.push((start+i)%state.playerCount);
        for (let idx of order) {
            let p=state.players[idx];
            while (p.hand.length<6 && state.deck.length) p.hand.push(state.deck.pop());
            if (p.hand.length===0 && state.deck.length===0) p.out=true;
        }
        state.table=[]; state.transferUsed=[];
        const active = state.players.filter(p=>!p.out && p.hand.length>0);
        if (active.length<=1 && state.deck.length===0) { endGame(); return; }
        if (success) state.attackerIdx = state.defenderIdx;
        else state.attackerIdx = nextPlayer(state.defenderIdx); // пропуск хода
        state.defenderIdx = nextPlayer(state.attackerIdx);
        state.transferUsed = [state.attackerIdx];
        state.roundActive = true;
        state.attackOpen = true;
        state.waitingForPlayerBeato = false;
        sortAllHands();
        updateUI();
        scheduleBotIfNeeded();
        if (state.defenderIdx===0) notify('Теперь ваша защита!','#e67e22');
        else if (state.attackerIdx===0) notify('Ваш ход атаковать','#2980b9');
    }

    function endGame() {
        state.gameOn = false; state.gameOver = true;
        const loser = state.players.find(p=>!p.out && p.hand.length>0) || state.players.find(p=>p.hand.length>0);
        const humanLost = loser && loser.id===0;
        if (humanLost) { state.balance -= state.bet; if (state.balance<0) state.balance=0; $resultTitle.textContent='😞 ВЫ ПРОИГРАЛИ'; $resultMsg.textContent=`Потеряно: ${state.bet.toLocaleString()} ₽`; }
        else { state.balance += state.bet; $resultTitle.textContent='🎉 ПОБЕДА'; $resultMsg.textContent=`Выигрыш: ${state.bet.toLocaleString()} ₽`; }
        saveBalance(); updateUI(); $resultOverlay.classList.add('show');
    }

    function drawPhase() { endRound(true); }

    // Действия игрока
    function playerAttack(card) {
        if (!state.roundActive||!state.attackOpen) return;
        if (state.defenderIdx===0) return;
        if (state.table.length===0 && state.attackerIdx!==0) return;
        if (state.table.length>0 && !ranksOnTable().has(card.rank)) return;
        if (state.table.length >= Math.min(6, state.players[state.defenderIdx].hand.length)) return;
        const idx = state.players[0].hand.findIndex(c=>c.id===card.id);
        if (idx===-1) return;
        state.players[0].hand.splice(idx,1);
        state.table.push({attack:card, defend:null, from:0});
        state.transferUsed = [state.attackerIdx];
        updateUI();
        scheduleBotIfNeeded();
    }

    function playerDefend(card, pairIdx) {
        if (state.defenderIdx!==0) return;
        const pair = state.table[pairIdx];
        if (!pair || pair.defend) return;
        if (!canBeat(pair.attack, card)) return;
        const idx = state.players[0].hand.findIndex(c=>c.id===card.id);
        if (idx===-1) return;
        state.players[0].hand.splice(idx,1);
        pair.defend = card;
        state.transferUsed = [];
        updateUI();
        checkAfterDefend();
    }

    function playerTransfer(card) {
        if (state.defenderIdx!==0||state.table.length===0) return;
        const rank0 = state.table[0].attack.rank;
        if (card.rank !== rank0) return;
        const nextDef = nextPlayer(0);
        if (state.transferUsed.includes(nextDef)) return;
        if (state.players[nextDef].hand.length < state.table.length+1) return;
        const idx = state.players[0].hand.findIndex(c=>c.id===card.id);
        if (idx===-1) return;
        state.players[0].hand.splice(idx,1);
        state.table.push({attack:card, defend:null, from:0});
        state.transferUsed.push(0);
        state.defenderIdx = nextDef;
        state.attackerIdx = state.transferUsed[0];
        updateUI();
        notify(`Перевели на ${state.players[nextDef].name}`, '#8e44ad');
        scheduleBotIfNeeded();
    }

    function playerTake() {
        if (state.defenderIdx!==0||state.table.length===0) return;
        state.table.forEach(p=>{ state.players[0].hand.push(p.attack); if(p.defend) state.players[0].hand.push(p.defend); });
        state.table = [];
        sortHand(state.players[0]);
        updateUI();
        notify('Вы забрали карты и пропускаете ход', '#c0392b');
        endRound(false);
    }

    // Кнопка Бито только при атаке
    function playerBeato() {
        if (state.attackerIdx !== 0) return;
        if (!state.table.every(p=>p.defend)) return;
        state.waitingForPlayerBeato = false;
        drawPhase();
    }

    function checkAfterDefend() {
        const allDef = state.table.every(p=>p.defend);
        if (allDef && state.defenderIdx === 0) {
            // игрок защищался и отбился — боты решают сами
            state.waitingForPlayerBeato = false;
            updateUI();
            notify('Все карты отбиты!', '#2ecc71');
            scheduleBotIfNeeded();
        } else if (!allDef) {
            scheduleBotIfNeeded();
        }
        updateUI();
    }

    // Боты
    function highlightBot(playerId) {
        document.querySelectorAll('.bot-card').forEach(el=>{
            if (el.dataset && parseInt(el.dataset.playerId)===playerId) {
                el.classList.add('active-action');
                setTimeout(()=>el.classList.remove('active-action'),600);
            }
        });
    }
    function scheduleBotIfNeeded() {
        if (!state.gameOn||state.gameOver) return;
        if (state.waitingForPlayerBeato) return;
        if (state.defenderIdx===0 && state.table.some(p=>!p.defend)) return;
        if (state.attackerIdx===0 && state.table.length===0) return;
        setTimeout(()=>botTurn(), 1000);
    }
    function botTurn() {
        if (!state.gameOn||state.gameOver||state.waitingForPlayerBeato) return;
        const def = state.players[state.defenderIdx];
        const att = state.players[state.attackerIdx];
        if (def && !def.isHuman && state.table.some(p=>!p.defend)) { highlightBot(def.id); botDefend(def); return; }
        if (state.table.length===0 && att && !att.isHuman) { highlightBot(att.id); botFirstAttack(att); return; }
        if (state.attackOpen && state.table.length>0 && !state.waitingForPlayerBeato) { botThrowIn(); return; }
        const allDef = state.table.every(p=>p.defend);
        if (allDef && state.table.length>0) {
            if (botDecideThrowMore() && !state.waitingForPlayerBeato) { botThrowIn(); return; }
            else { if (!state.waitingForPlayerBeato) drawPhase(); return; }
        }
    }
    function botFirstAttack(attacker) {
        if (attacker.hand.length===0) return;
        const card = chooseAttackCard(attacker);
        const idx = attacker.hand.indexOf(card);
        attacker.hand.splice(idx,1);
        state.table.push({attack:card, defend:null, from:attacker.id});
        state.transferUsed = [attacker.id];
        updateUI();
        scheduleBotIfNeeded();
    }
    function chooseAttackCard(bot) {
        const h = bot.hand, diff = bot.diff||'medium';
        if (diff==='easy') return h[Math.floor(Math.random()*Math.min(3,h.length))];
        let nonTrump = h.filter(c=>!isTrump(c));
        if (nonTrump.length && (diff!=='impossible'||Math.random()<0.9)) { nonTrump.sort((a,b)=>a.value-b.value); return nonTrump[0]; }
        h.sort((a,b)=>a.value-b.value);
        return h[0];
    }
    function botDefend(bot) {
        const undef = state.table.find(p=>!p.defend);
        if (!undef) return;
        if (canBotTransfer(bot, undef)) {
            const chance = {easy:0.15, medium:0.4, hard:0.6, impossible:0.85}[bot.diff]||0.5;
            if (Math.random()<chance) { botDoTransfer(bot, undef); return; }
        }
        const defCard = chooseDefCard(bot, undef.attack);
        if (defCard) {
            const idx = bot.hand.indexOf(defCard);
            bot.hand.splice(idx,1);
            undef.defend = defCard;
            state.transferUsed = [];
            updateUI();
            notify(`${bot.name} отбился`, '#2ecc71');
            checkAfterDefend();
            return;
        }
        notify(`${bot.name} забирает карты и пропускает ход`, '#c0392b');
        setTimeout(()=>{
            state.table.forEach(p=>{ bot.hand.push(p.attack); if(p.defend) bot.hand.push(p.defend); });
            state.table = [];
            sortHand(bot);
            updateUI();
            endRound(false);
        }, 600);
    }
    function canBotTransfer(bot, undef) {
        if (state.table.length>=6) return false;
        const nextD = nextPlayer(bot.id);
        if (state.transferUsed.includes(nextD)) return false;
        if (state.players[nextD].hand.length < state.table.length+1) return false;
        return bot.hand.some(c=>c.rank===undef.attack.rank);
    }
    function botDoTransfer(bot, undef) {
        const card = bot.hand.find(c=>c.rank===undef.attack.rank);
        const idx = bot.hand.indexOf(card);
        bot.hand.splice(idx,1);
        state.table.push({attack:card, defend:null, from:bot.id});
        state.transferUsed.push(bot.id);
        state.defenderIdx = nextPlayer(bot.id);
        state.attackerIdx = state.transferUsed[0];
        updateUI();
        notify(`${bot.name} перевёл атаку`, '#8e44ad');
        scheduleBotIfNeeded();
    }
    function chooseDefCard(bot, attCard) {
        const possible = bot.hand.filter(c=>canBeat(attCard,c));
        if (!possible.length) return null;
        const diff = bot.diff||'medium';
        if (diff==='easy') return possible[Math.floor(Math.random()*possible.length)];
        let nonTrump = possible.filter(c=>!isTrump(c));
        if (nonTrump.length && diff!=='impossible') { nonTrump.sort((a,b)=>a.value-b.value); return nonTrump[0]; }
        possible.sort((a,b)=>a.value-b.value);
        return possible[0];
    }
    function botThrowIn() {
        const ranks = ranksOnTable();
        const def = state.players[state.defenderIdx];
        const maxAdd = Math.min(6, def.hand.length) - state.table.length;
        if (maxAdd<=0||state.waitingForPlayerBeato) { botDecideEnd(); return; }
        let acted = false;
        for (let p of state.players) {
            if (p.out||p.isHuman||p.id===state.defenderIdx) continue;
            if (state.table.length >= Math.min(6, def.hand.length)) break;
            const chance = {easy:0.3, medium:0.55, hard:0.75, impossible:0.95}[p.diff]||0.5;
            if (Math.random()>chance) continue;
            const card = p.hand.find(c=>ranks.has(c.rank) && (p.diff!=='impossible'||!isTrump(c)||p.hand.filter(isTrump).length>2));
            if (card) {
                p.hand.splice(p.hand.indexOf(card),1);
                state.table.push({attack:card, defend:null, from:p.id});
                ranks.add(card.rank);
                acted = true;
                highlightBot(p.id);
                updateUI();
            }
        }
        if (acted) scheduleBotIfNeeded(); else botDecideEnd();
    }
    function botDecideThrowMore() {
        const def = state.players[state.defenderIdx];
        if (state.table.length >= Math.min(6, def.hand.length)) return false;
        const ranks = ranksOnTable();
        return state.players.some(p=>!p.out && p.id!==state.defenderIdx && p.hand.some(c=>ranks.has(c.rank)));
    }
    function botDecideEnd() {
        const allDef = state.table.every(p=>p.defend);
        if (allDef && state.table.length>0) {
            if (state.waitingForPlayerBeato) return;
            if (botDecideThrowMore() && Math.random()<0.4) { botThrowIn(); return; }
            drawPhase();
        }
    }

    // Рендеринг
    function renderActions() {
        let html = '';
        const def = state.players[state.defenderIdx];
        const allDef = state.table.every(p=>p.defend);
        const hasUndef = state.table.some(p=>!p.defend);

        if (state.defenderIdx===0 && hasUndef) {
            html += '<button class="btn-take" onclick="playerTake()">📥 Забрать</button>';
            if (state.table.length>0) {
                const rank0 = state.table[0].attack.rank;
                const canTrans = state.players[0].hand.some(c=>c.rank===rank0) &&
                                !state.transferUsed.includes(nextPlayer(0)) &&
                                state.players[nextPlayer(0)].hand.length >= state.table.length+1;
                if (canTrans) html += '<button class="btn-transfer" onclick="transferPrompt()">🔄 Перевести</button>';
            }
        } else if (state.defenderIdx===0 && allDef && state.table.length>0) {
            html += '<span style="color:#f0d78c;">Все карты отбиты. Ожидание...</span>';
        } else if (state.attackerIdx===0 && state.table.length===0 && state.roundActive) {
            html += '<span style="color:#f0d78c;">Выберите карту для атаки</span>';
        } else if (state.attackerIdx===0 && state.table.length>0 && allDef && !state.waitingForPlayerBeato) {
            html += '<button class="btn-beato" onclick="playerBeato()">✅ Бито</button>';
            if (state.players[0].hand.some(c=>ranksOnTable().has(c.rank))) {
                html += '<span style="color:#aaa; margin-left:10px;">Или подкиньте карту</span>';
            }
        } else if (state.waitingForPlayerBeato && state.attackerIdx===0) {
            html += '<button class="btn-beato" onclick="playerBeato()">✅ Бито</button>';
        }
        $actionBar.innerHTML = html || '<span style="color:#888;">Ожидание ботов...</span>';
    }

    function updateUI() {
        $balDisplay.textContent = state.balance.toLocaleString()+' ₽';
        if (state.gameOn) {
            $gBal.textContent = state.balance.toLocaleString()+' ₽';
            $gBet.textContent = state.bet.toLocaleString()+' ₽';
            $gTrump.textContent = state.trumpSuit;
            $gDeck.textContent = state.deck.length;
            renderBots(); renderTable(); renderHand(); renderActions();
        }
    }
    function renderBots() {
        let html = '';
        for (let p of state.players) {
            if (p.isHuman) continue;
            let cls = 'bot-card';
            if (p.id===state.defenderIdx) cls += ' defender';
            if (p.id===state.attackerIdx && state.table.length===0) cls += ' attacker';
            const st = p.out?'out':(p.id===state.defenderIdx?'def':(p.id===state.attackerIdx&&state.table.length===0?'att':'wait'));
            html += `<div class="${cls}" data-player-id="${p.id}">
                <div class="bot-name">${p.name}</div>
                <div class="bot-cards-count"><span class="card-icon">🃏</span> <span>${p.hand.length}</span></div>
                <div class="status ${st}">${p.out?'Вышел':(st==='def'?'🛡 Защита':(st==='att'?'⚔ Атакует':'Ожидает'))}</div>
            </div>`;
        }
        $botArea.innerHTML = html;
    }
    function renderTable() {
        if (!state.table.length) { $tableArea.innerHTML = '<span style="color:#555;">Стол пуст</span>'; return; }
        let html = '';
        state.table.forEach(p=>{
            html += `<div class="pair">
                <div class="card attack ${cardColor(p.attack)}"><span class="rank">${p.attack.rank}</span><span class="suit">${p.attack.suit}</span></div>
                ${p.defend?`<div class="card defend ${cardColor(p.defend)}" style="margin-top:-25px;"><span class="rank">${p.defend.rank}</span><span class="suit">${p.defend.suit}</span></div>`:''}
            </div>`;
        });
        $tableArea.innerHTML = html;
    }
    function renderHand() {
        const human = state.players[0];
        if (human.out) { $playerHand.innerHTML = '<span style="color:#888;">Вы вышли</span>'; return; }
        let html = '';
        human.hand.forEach(c=>{
    html += `<div class="card ${cardColor(c)}${isTrump(c) ? ' trump-card' : ''}" data-id="${c.id}" onclick="handleCardClick('${c.id}')">
                <span class="rank">${c.rank}</span><span class="suit">${c.suit}</span>
            </div>`;
        });
        $playerHand.innerHTML = html;
    }

    // Глобальные обработчики
    window.skipThrow = function() {
        if (!state.attackOpen) return;
        state.attackOpen = false;
        state.waitingForPlayerBeato = false;
        updateUI();
        setTimeout(()=>{ if (state.table.every(p=>p.defend)) drawPhase(); }, 300);
    };
    window.transferPrompt = function() {
        if (state.defenderIdx!==0) return;
        const rank0 = state.table[0].attack.rank;
        const card = state.players[0].hand.find(c=>c.rank===rank0);
        if (card) playerTransfer(card); else notify('Нет карты для перевода','#c0392b');
    };
    window.handleCardClick = function(cardId) {
        if (!state.gameOn||state.gameOver) return;
        const card = state.players[0].hand.find(c=>c.id===cardId);
        if (!card) return;
        if (state.defenderIdx===0 && state.table.some(p=>!p.defend)) {
            const idx = state.table.findIndex(p=>!p.defend);
            playerDefend(card, idx);
        } else if ((state.attackerIdx===0||state.attackOpen) && state.defenderIdx!==0) {
            playerAttack(card);
        }
    };
    window.quitGame = function() {
        if (state.gameOn && !state.gameOver && state.table.length>0) {
            if (!confirm('Выйти? Ставка будет потеряна.')) return;
            state.balance -= state.bet;
            if (state.balance<0) state.balance=0;
            saveBalance();
        }
        backToSetup();
    };
    window.backToSetup = function() {
        state.gameOn = false; state.gameOver = true;
        $resultOverlay.classList.remove('show');
        $game.classList.remove('active');
        $setup.style.display = '';
        renderSetup();
        saveBalance();
    };

    // Промокоды
    window.openPromo = function() { $promoModal.classList.add('show'); $promoInput.value = ''; };
    window.closePromo = function() { $promoModal.classList.remove('show'); };
    window.applyPromo = function() {
        const code = $promoInput.value.trim().toUpperCase();
        if (!code) { notify('Введите промокод','#c0392b'); return; }
        if (!state.promoCodes || Object.keys(state.promoCodes).length===0) { notify('Промокоды не загружены','#e67e22'); closePromo(); return; }
        if (state.promoCodes[code]) {
            const used = JSON.parse(localStorage.getItem('used_promo_codes')||'[]');
            if (used.includes(code)) { notify('Этот промокод уже использован','#c0392b'); closePromo(); return; }
            const amount = state.promoCodes[code];
            state.balance += amount;
            saveBalance();
            used.push(code);
            localStorage.setItem('used_promo_codes', JSON.stringify(used));
            notify(`Промокод активирован! +${amount} ₽`,'#2ecc71');
            updateUI();
        } else { notify('Неверный промокод','#c0392b'); }
        closePromo();
    };

    // Настройки
    function renderSetup() {
        $balDisplay.textContent = state.balance.toLocaleString()+' ₽';
        let betHtml = '';
        BET_OPTIONS.forEach(b=>{
            let cls = state.bet===b?'selected':'';
            if (b>=HIGH_LIMIT && state.difficulty!=='impossible') cls += ' locked';
            betHtml += `<button class="btn-opt ${cls}" onclick="setBet(${b})">${b.toLocaleString()} ₽</button>`;
        });
        document.getElementById('betRow').innerHTML = betHtml;
        let diffHtml = '';
        DIFF_OPTIONS.forEach(d=>{
            let cls = state.difficulty===d?'selected':'';
            if (state.bet>=HIGH_LIMIT && d!=='impossible') cls += ' locked';
            diffHtml += `<button class="btn-opt ${cls}" onclick="setDiff('${d}')">${DIFF_NAMES[d]}</button>`;
        });
        document.getElementById('diffRow').innerHTML = diffHtml;
        let cntHtml = '';
        PLAYER_COUNTS.forEach(c=>{
            cntHtml += `<button class="btn-opt ${state.playerCount===c?'selected':''}" onclick="setCount(${c})">${c} игрока</button>`;
        });
        document.getElementById('countRow').innerHTML = cntHtml;
        $btnStart.disabled = state.bet > state.balance;
    }
    window.setBet = function(b) {
        if (b>=HIGH_LIMIT && state.difficulty!=='impossible') state.difficulty = 'impossible';
        state.bet = b; renderSetup();
    };
    window.setDiff = function(d) {
        if (state.bet>=HIGH_LIMIT && d!=='impossible') { notify('На высоких ставках только "Невозможный" режим','#c0392b'); return; }
        state.difficulty = d; renderSetup();
    };
    window.setCount = function(c) { state.playerCount = c; renderSetup(); };

    function saveBalance() { localStorage.setItem('durak_balance', state.balance); }
    function loadBalance() {
        const saved = localStorage.getItem('durak_balance');
        if (saved) state.balance = Math.max(0, parseInt(saved)||10000);
    }

    // Старт
    loadPromoCodes();
    $btnStart.addEventListener('click', startGame);
    loadBalance();
    renderSetup();
    window.playerTake = playerTake;
    window.playerBeato = playerBeato;
})();
</script>
</body>
</html>
